<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./resources/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">

    <title>Loto machine</title>
</head>

<body>
    <section id="slot_machine">
        <section id="main-screen">
            <section id="payout">
                <h2>Payout</h2>
                    <div id="wins1" class="wins">
                        <img class="winner1" src="./resources/images/7-cartoon.png">
                        <img class="winner1" src="./resources/images/7-cartoon.png">
                        <img class="winner1" src="./resources/images/7-cartoon.png">
                    </div>
                    <div id="wins2" class="wins">
                        <img class="winner1" src="./resources/images/Bar.png">
                        <img class="winner1" src="./resources/images/Bar.png">
                        <img class="winner1" src="./resources/images/Bar.png">
                    </div>
                    <div id="wins3" class="wins">
                        <img class="winner2" src="./resources/images/bell.png">
                        <img class="winner2" src="./resources/images/bell.png">
                        <img class="winner2" src="./resources/images/bell.png">
                        <h5>OR</h5>
                        <img class="winner2" src="./resources/images/cherry.png">
                        <img class="winner2" src="./resources/images/cherry.png">
                        <img class="winner2" src="./resources/images/cherry.png">
                    </div>
                    <div id="wins4" class="wins2">
                        <img class="winner3" src="./resources/images/lemon.png">
                        <img class="winner3" src="./resources/images/lemon.png">
                        <img class="winner3" src="./resources/images/lemon.png">
                        <h5>OR</h5>
                        <img class="winner3" src="./resources/images/orange.png">
                        <img class="winner3" src="./resources/images/orange.png">
                        <img class="winner3" src="./resources/images/orange.png">
                        <h5>OR</h5>
                        <img class="winner3" src="./resources/images/Grape.png">
                        <img class="winner3" src="./resources/images/Grape.png">
                        <img class="winner3" src="./resources/images/Grape.png">
                    </div>
                    <div id="wins5" class="wins">
                        <h5>TWO OF ANY WINS HALF MONEY BACK</h5>
                    </div>
            </section>
            <section id="spinners">
                <div class="spinner_image">
                    <img class="images" src="./resources/images/bell.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="./resources/images/7-cartoon.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="./resources/images/cherry.png">
                </div>
                <div id="won" class="spinner_image">
                    <img class="images" src="./resources/images/Bar.png">
                </div>
                <div id="won1" class="spinner_image">
                    <img class="images" src="./resources/images/Bar.png">
                </div>
                <div id="won2" class="spinner_image">
                    <img class="images" src="./resources/images/Bar.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="./resources/images/Grape.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="./resources/images/lemon.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="./resources/images/orange.png">
                </div>
            </section>
        </section>
        <section id="controls">
            <div id="all_controls">
                <div id="control_title">
                    <h2>Bet To Win</h2>
                </div>
                <div id="control_buttons">
                    <button id="bet_one">Bet one</button>
                    <button id="bet_five">Bet Five</button>
                    <button id="bet_ten">Bet Ten</button>
                    <button id="bet_max">Bet Max</button>
                </div>
            </div>
            <div id="play">
                <a href="">
                    <div id="play_button">
                        <h1>Spin</h1>
                    </div>
                </a>


            </div>
        </section>
    </section>
</body>

</html>
